opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - fatal_error_message
  - first_where
  - identical_operands
  - joined_default_parameter
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - unavailable_function

disabled_rules:
  - trailing_whitespace
  - todo
  - opening_brace
  - nesting
  - trailing_comma

identifier_name:
  min_length: 1

line_length:
  warning: 160
  error: 250

function_body_length:
  warning: 100
  error: 200

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 800
  error: 1500

large_tuple: 4

function_parameter_count:
  warning: 7
  error: 10

cyclomatic_complexity:
  warning: 15
  error: 30

excluded:
  - "*/DerivedData"
  - "LoomClone.xcodeproj"
  - "TestHarness"
