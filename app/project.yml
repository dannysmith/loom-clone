name: LoomClone
options:
  bundleIdPrefix: com.danny.loomclone
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: targeted
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  LoomClone:
    type: application
    platform: macOS
    sources:
      - path: LoomClone
    settings:
      base:
        INFOPLIST_FILE: LoomClone/Info.plist
        CODE_SIGN_ENTITLEMENTS: LoomClone.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.danny.loomclone
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
