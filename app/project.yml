name: LoomClone
options:
  bundleIdPrefix: is.danny.loomclone
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"
  createIntermediateGroups: true

packages:
  argmax-oss-swift:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: "0.9.0"

settingGroups:
  codeQuality:
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    GCC_TREAT_WARNINGS_AS_ERRORS: true

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    groups:
      - codeQuality

targets:
  LoomClone:
    type: application
    platform: macOS
    sources:
      - path: LoomClone
    dependencies:
      - package: argmax-oss-swift
        product: WhisperKit
    settings:
      base:
        INFOPLIST_FILE: LoomClone/Info.plist
        CODE_SIGN_ENTITLEMENTS: LoomClone.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: is.danny.loomclone
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XT349SJG9U
    postCompileScripts:
      - script: |
          if [ -x /opt/homebrew/bin/swiftlint ]; then
            /opt/homebrew/bin/swiftlint lint --quiet
          elif command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed — install with 'brew install swiftlint'"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false

  LoomCloneTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LoomCloneTests
    dependencies:
      - target: LoomClone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.danny.loomclone.tests
        GENERATE_INFOPLIST_FILE: true
        DEVELOPMENT_TEAM: XT349SJG9U

  LoomCloneTestHarness:
    # Diagnostic tool for AVFoundation/VideoToolbox/CIContext configurations.
    # See docs/tasks-todo/task-0C-isolation-test-harness.md. NOT shipped.
    # This is an app bundle (not a CLI) because screen capture and camera
    # access require a bundled signed app with entitlements.
    type: application
    platform: macOS
    sources:
      - path: TestHarness
        excludes:
          - "Scripts/**"
          - "test-runs/**"
          - "README.md"
    settings:
      base:
        INFOPLIST_FILE: TestHarness/Info.plist
        CODE_SIGN_ENTITLEMENTS: TestHarness/TestHarness.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: is.danny.loomclone.testharness
        PRODUCT_NAME: LoomCloneTestHarness
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XT349SJG9U
    postCompileScripts:
      - script: |
          if [ -x /opt/homebrew/bin/swiftlint ]; then
            /opt/homebrew/bin/swiftlint lint --quiet
          elif command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed — install with 'brew install swiftlint'"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
